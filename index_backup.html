<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jenise Yang</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0614; overflow: hidden; font-family: 'Inter', sans-serif; width: 100vw; height: 100vh; cursor: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMiIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDMyIDI0Ij48cGF0aCBkPSJNMiw4IEwyLDIgTDgsMiIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIxLjUiIGZpbGw9Im5vbmUiLz48cGF0aCBkPSJNMjQsMiBMMzAsMiBMMzAsOCIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIxLjUiIGZpbGw9Im5vbmUiLz48cGF0aCBkPSJNMiwxNiBMMiwyMiBMOCwyMiIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIxLjUiIGZpbGw9Im5vbmUiLz48cGF0aCBkPSJNMjQsMjIgTDMwLDIyIEwzMCwxNiIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIxLjUiIGZpbGw9Im5vbmUiLz48Y2lyY2xlIGN4PSIxNiIgY3k9IjEyIiByPSIxLjIiIGZpbGw9IndoaXRlIi8+PC9zdmc+") 16 12, crosshair; }

    .scene { position: fixed; inset: 0; overflow: hidden; }

    .alley-bg {
      position: absolute;
      width: 108%; height: 108%;
      top: -4%; left: -4%;
      background-image: url('images/alley2.png');
      background-size: cover;
      background-position: center top;
      will-change: transform;
    }

    .vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(10,6,20,0.65) 100%);
      pointer-events: none; z-index: 2;
    }

    .fog-bottom {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(10,6,20,0.5) 0%, transparent 28%);
      pointer-events: none; z-index: 2;
    }

    .scanlines {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.018) 3px, rgba(0,0,0,0.018) 4px);
      pointer-events: none; z-index: 50;
    }

    .hotspot {
      position: absolute;
      z-index: 20;
      cursor: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMiIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDMyIDI0Ij48cGF0aCBkPSJNMiw4IEwyLDIgTDgsMiIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIxLjUiIGZpbGw9Im5vbmUiLz48cGF0aCBkPSJNMjQsMiBMMzAsMiBMMzAsOCIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIxLjUiIGZpbGw9Im5vbmUiLz48cGF0aCBkPSJNMiwxNiBMMiwyMiBMOCwyMiIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIxLjUiIGZpbGw9Im5vbmUiLz48cGF0aCBkPSJNMjQsMjIgTDMwLDIyIEwzMCwxNiIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIxLjUiIGZpbGw9Im5vbmUiLz48Y2lyY2xlIGN4PSIxNiIgY3k9IjEyIiByPSIxLjIiIGZpbGw9IndoaXRlIi8+PC9zdmc+") 16 12, crosshair;
      border-radius: 3px;
    }
    .hotspot:hover { cursor: pointer; }

    .hotspot-glow {
      position: absolute; inset: 0;
      border-radius: 3px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .hp-projects .hotspot-glow { background: radial-gradient(ellipse at center, rgba(255,60,172,0.15) 0%, transparent 75%); }
    .hp-research .hotspot-glow { background: radial-gradient(ellipse at center, rgba(255,170,68,0.15) 0%, transparent 75%); }
    .hp-about    .hotspot-glow { background: radial-gradient(ellipse at center, rgba(0,245,228,0.15)  0%, transparent 75%); }
    .hotspot:hover .hotspot-glow { opacity: 1; }

    /* WALL LABELS -- absolute inside .scene, tracks with image */
    .wall-label {
      position: absolute;
      pointer-events: none;
      z-index: 30;
      font-size: clamp(1.2rem, 2.2vw, 2rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      opacity: 0;
      transition: opacity 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.1;
    }
    .wall-label.visible { opacity: 1; }
    .wall-label span { display: block; }

    /* Projects -- rightmost edge of purple wall */
    #wallProjects {
      left: 23%;
      top: 48%;
      color: #fff;
      text-shadow: 0 0 8px rgba(255,100,220,0.9), 0 0 20px rgba(255,60,172,0.7);
    }

    /* Research -- red vertical pillar */
    #wallResearch {
      left: 64.5%;
      top: 35%;
      color: #fff;
      text-shadow: 0 0 8px rgba(255,100,80,0.9), 0 0 20px rgba(200,50,30,0.7);
    }

    /* About -- follows cursor */
    #wallAbout {
      position: fixed;
      left: 2%;
      top: 7%;
      color: #fff;
      text-shadow: 0 0 8px rgba(0,245,228,0.9), 0 0 20px rgba(0,200,180,0.7);
      font-size: clamp(1rem, 2vw, 1.6rem);
      flex-direction: row;
      gap: 0.3em;
    }

    /* RIPPLE */
    .ripple {
      position: fixed;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.55);
      pointer-events: none;
      z-index: 300;
      opacity: 0;
      transform: translate(-50%, -50%);
    }

    /* INTRO POPUP */
    .intro-popup {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 150;
      pointer-events: none;
      text-align: center;
      background: rgba(10,6,20,0.72);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 2.5rem 3.5rem;
      opacity: 0;
      transition: opacity 0.8s ease;
      min-width: 360px;
    }
    .intro-popup.visible { opacity: 1; }

    .intro-popup-text {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin-bottom: 2rem;
      min-height: 1.2em;
    }

    .intro-arrows {
      display: flex;
      gap: 3rem;
      justify-content: center;
    }

    .intro-arrow {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .intro-arrow-label {
      font-size: 0.75rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .intro-arrow-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to top, transparent, currentColor);
      animation: arrowFloat 1.6s ease-in-out infinite;
    }

    .arrow-projects { color: #ff9ef5; }
    .arrow-research { color: #ffaa44; animation-delay: 0.3s; }
    .arrow-about    { color: #00f5e4; animation-delay: 0.6s; }

    @keyframes arrowFloat {
      0%,100% { opacity: 0.5; transform: translateY(5px); }
      50% { opacity: 1; transform: translateY(0); }
    }

    /* PAGE TRANSITION */
    .transition-overlay {
      position: fixed; inset: 0;
      background: #0a0614;
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.65s cubic-bezier(0.4,0,0.2,1);
    }
    .transition-overlay.fade-in { opacity: 1; pointer-events: all; }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <div class="alley-bg" id="alleyBg"></div>
    <div class="vignette"></div>
    <div class="fog-bottom"></div>

    <!-- PROJECTS: the art poster on the purple wall -->
    <div class="hotspot hp-projects" id="hp-projects"
         style="left:3%; top:35%; width:14%; height:42%;">
      <div class="hotspot-glow"></div>
    </div>

    <!-- RESEARCH: the newspaper/poster door on the right -->
    <div class="hotspot hp-research" id="hp-research"
         style="left:68%; top:15%; width:24%; height:80%;">
      <div class="hotspot-glow"></div>
    </div>

    <!-- ABOUT: JENISE YANG neon sign top left -->
    <div class="hotspot hp-about" id="hp-about"
         style="left:0%; top:0%; width:28%; height:22%;">
      <div class="hotspot-glow"></div>
    </div>

    <!-- WALL LABELS inside scene so they track with the image -->
    <div class="wall-label" id="wallProjects"></div>
    <div class="wall-label" id="wallResearch"></div>
    <div class="wall-label" id="wallAbout"></div>
  </div>

  <div class="scanlines"></div>

  <!-- INTRO POPUP -->
  <div class="intro-popup" id="introPopup">
    <p class="intro-popup-text" id="introText"></p>
    <div class="intro-arrows">
      <div class="intro-arrow arrow-projects">
        <div class="intro-arrow-line"></div>
        <span class="intro-arrow-label">projects</span>
      </div>
      <div class="intro-arrow arrow-research">
        <div class="intro-arrow-line"></div>
        <span class="intro-arrow-label">research</span>
      </div>
      <div class="intro-arrow arrow-about">
        <div class="intro-arrow-line"></div>
        <span class="intro-arrow-label">about</span>
      </div>
    </div>
  </div>

  <div class="ripple" id="ripple"></div>
  <div class="transition-overlay" id="transOverlay"></div>

  <script>
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#!%&';

  function scrambleEl(el, final, cb) {
    const isAbout = el.id === 'wallAbout';
    let frame = 0;
    clearInterval(el._iv);
    el._iv = setInterval(() => {
      frame++;
      const letters = final.split('').map((ch, i) => {
        if (ch === ' ') return isAbout ? ' ' : '';
        const revealed = frame > i * 2;
        const c = revealed ? ch : chars[Math.floor(Math.random() * chars.length)];
        return `<span>${c}</span>`;
      }).join('');
      el.innerHTML = letters;
      if (frame > 20) {
        el.innerHTML = final.split('').map(ch => ch === ' ' ? (isAbout ? ' ' : '') : `<span>${ch}</span>`).join('');
        clearInterval(el._iv);
        if (cb) cb();
      }
    }, 50);
  }

  function scrambleText(el, final, cb) {
    let frame = 0;
    clearInterval(el._iv);
    el._iv = setInterval(() => {
      frame++;
      if (frame > 20) {
        el.textContent = final;
        clearInterval(el._iv);
        if (cb) cb();
        return;
      }
      el.textContent = final.split('').map((ch, i) => {
        if (ch === ' ') return ' ';
        if (frame > i * 2) return ch;
        return chars[Math.floor(Math.random() * chars.length)];
      }).join('');
    }, 50);
  }
  const bg = document.getElementById('alleyBg');
  let mouseX=0, mouseY=0, curX=0, curY=0;

  document.addEventListener('mousemove', e => {
    mouseX = (e.clientX/window.innerWidth  - 0.5) * 2;
    mouseY = (e.clientY/window.innerHeight - 0.5) * 2;
    wallAbout.style.left = (e.clientX + 16) + 'px';
    wallAbout.style.top  = (e.clientY - 14) + 'px';
  });

  (function parallax() {
    curX += (mouseX - curX) * 0.04;
    curY += (mouseY - curY) * 0.04;
    bg.style.transform = `translate(${curX * -28}px, ${curY * -16}px)`;
    requestAnimationFrame(parallax);
  })();

  // INTRO POPUP with scramble
  const introPopup = document.getElementById('introPopup');
  const introText  = document.getElementById('introText');
  setTimeout(() => {
    introPopup.classList.add('visible');
    scrambleText(introText, 'explore the alley');
  }, 400);
  setTimeout(() => { introPopup.classList.remove('visible'); }, 4200);

  // PARALLAX
  const wallProjects = document.getElementById('wallProjects');
  const wallResearch = document.getElementById('wallResearch');
  const wallAbout    = document.getElementById('wallAbout');

  // HOTSPOTS
  const hotspots = [
    { id:'hp-projects', text:'PROJECTS', url:'projects.html', wall: wallProjects },
    { id:'hp-research', text:'RESEARCH', url:'research.html', wall: wallResearch },
    { id:'hp-about',    text:'ABOUT',    url:'about.html',    wall: wallAbout    },
  ];

  const FILM_CURSOR = 'url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMiIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDMyIDI0Ij48cGF0aCBkPSJNMiw4IEwyLDIgTDgsMiIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIxLjUiIGZpbGw9Im5vbmUiLz48cGF0aCBkPSJNMjQsMiBMMzAsMiBMMzAsOCIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIxLjUiIGZpbGw9Im5vbmUiLz48cGF0aCBkPSJNMiwxNiBMMiwyMiBMOCwyMiIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIxLjUiIGZpbGw9Im5vbmUiLz48cGF0aCBkPSJNMjQsMjIgTDMwLDIyIEwzMCwxNiIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIxLjUiIGZpbGw9Im5vbmUiLz48Y2lyY2xlIGN4PSIxNiIgY3k9IjEyIiByPSIxLjIiIGZpbGw9IndoaXRlIi8+PC9zdmc+") 16 12, crosshair';

  hotspots.forEach(({ id, text, url, wall }) => {
    const el = document.getElementById(id);
    el.addEventListener('mouseenter', () => {
      wall.classList.add('visible');
      scrambleEl(wall, text);
      document.body.style.cursor = FILM_CURSOR;
    });
    el.addEventListener('mouseleave', () => {
      wall.classList.remove('visible');
      clearInterval(wall._iv);
      document.body.style.cursor = FILM_CURSOR;
    });
    el.addEventListener('click', e => triggerTransition(e, url));
  });

  // RIPPLE + TRANSITION
  const rippleEl  = document.getElementById('ripple');
  const overlayEl = document.getElementById('transOverlay');

  function triggerTransition(e, url) {
    const x = e.clientX, y = e.clientY;
    const maxR = Math.hypot(Math.max(x, window.innerWidth-x), Math.max(y, window.innerHeight-y));
    rippleEl.style.transition = 'none';
    rippleEl.style.left = x+'px'; rippleEl.style.top = y+'px';
    rippleEl.style.width = '0px'; rippleEl.style.height = '0px';
    rippleEl.style.opacity = '0.8';
    requestAnimationFrame(() => {
      rippleEl.style.transition = 'width 0.5s ease-out, height 0.5s ease-out, opacity 0.5s ease-out';
      rippleEl.style.width  = (maxR*2)+'px';
      rippleEl.style.height = (maxR*2)+'px';
      rippleEl.style.opacity = '0';
    });
    setTimeout(() => {
      overlayEl.classList.add('fade-in');
      setTimeout(() => { window.location.href = url; }, 700);
    }, 200);
  }

  // Fade in on load
  overlayEl.style.opacity = '1';
  overlayEl.style.transition = 'none';
  overlayEl.style.pointerEvents = 'none';
  requestAnimationFrame(() => {
    setTimeout(() => {
      overlayEl.style.transition = 'opacity 0.7s cubic-bezier(0.4,0,0.2,1)';
      overlayEl.style.opacity = '0';
    }, 50);
  });
  </script>
</body>
</html>
